# ── Server ────────────────────────────────────────────────
server.port=${SERVER_PORT:8086}

# ── MySQL DataSource ──────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/participatehere}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=false

# ── JWT ───────────────────────────────────────────────────
app.jwt.secret=${APP_JWT_SECRET:ParticipateHere_SuperSecret_JWT_Key_2024_Must_Be_At_Least_64_Characters_Long!}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:300000}
app.jwt.refresh-expiration-ms=${APP_JWT_REFRESH_EXPIRATION_MS:604800000}

# ── Logging ───────────────────────────────────────────────
logging.level.com.participatehere=DEBUG

# ── Mail Configuration ────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:YOUR_EMAIL_HERE}
spring.mail.password=${SPRING_MAIL_PASSWORD:YOUR_APP_PASSWORD_HERE}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── OpenAI / Groq API ─────────────────────────────────────
groq.api.key=${GROQ_API_KEY:YOUR_GROQ_API_KEY_HERE}

# ── CORS ──────────────────────────────────────────────────
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
